<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Estoque</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Controle de Estoque</h1>

        <input type="text" id="input-nome" placeholder="Nome do material">
        <input type="number" id="input-quantidade" placeholder="Quantidade">
        <button id="btn-cadastrar">Cadastrar</button>

        <h2>Materiais Cadastrados</h2>

        <table>
            <thead>
                <tr>
                    <th>Material</th>
                    <th>Quantidade</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="lista-materiais">
                </tbody>
        </table>
    </div>

    <script src="main.js"></script>
</body>
</html>
